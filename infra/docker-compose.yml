services:
  mysql:
    image: mysql:8.4
    container_name: ourspace-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ourspace_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ourspace}
      MYSQL_USER: ${MYSQL_USER:-ourspace}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ourspace_dev}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]

  redis:
    image: redis:7-alpine
    container_name: ourspace-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: ourspace-minio
    environment:
      MINIO_ROOT_USER: ${OSS_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OSS_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  mysql-data:
  minio-data:
