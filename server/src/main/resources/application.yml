server:
  port: 8080

spring:
  application:
    name: ourspace-server
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ourspace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:ourspace}
    password: ${DB_PASSWORD:ourspace_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt-secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
  crypto-key-base64: ${APP_CRYPTO_KEY_BASE64:}
  media-base-url: ${MEDIA_BASE_URL:}
  media-storage-dir: ${MEDIA_STORAGE_DIR:var/media}
  media-url-ttl-minutes: 15
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*}
